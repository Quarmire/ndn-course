# Build the Astro + Starlight course site and deploy it to GitHub Pages.
# Requires: repo Settings → Pages → Source = "GitHub Actions" (one-time).
name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "course-site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

# Least-privilege token, plus what deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; don't cancel it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload the site
        uses: withastro/action@v3
        with:
          path: course-site # the Astro project lives here, not the repo root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
